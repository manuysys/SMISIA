# ========================================================
# SMISIA — GitHub Actions CI
# ========================================================
name: SMISIA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 src/ --max-line-length=120 --ignore=E501,W503

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v --tb=short -x
      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=50

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Create required directories
        run: mkdir -p models data
      - name: Build Docker image
        run: docker build -t smisia-api:${{ github.sha }} .
      # Descomentar para push a registry:
      # - name: Push to registry
      #   run: |
      #     docker tag smisia-api:${{ github.sha }} ${{ secrets.REGISTRY }}/smisia-api:latest
      #     docker push ${{ secrets.REGISTRY }}/smisia-api:latest

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create directories
        run: mkdir -p models data
      - name: Start API
        run: |
          python serve.py &
          sleep 5
      - name: Test /metrics endpoint
        run: curl -f http://localhost:8000/metrics
      - name: Test /status endpoint
        run: |
          curl -f -H "X-API-Key: smisia-dev-key-2026" \
            http://localhost:8000/status/test_silo
