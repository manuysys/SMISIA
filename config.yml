# ========================================================
# SMISIA — Configuración Central
# ========================================================

project:
  name: "SMISIA"
  version: "1.0.0"
  random_seed: 42
  log_level: "INFO"
  log_format: "json"

# --------------------------------------------------------
# Rutas
# --------------------------------------------------------
paths:
  data_dir: "data"
  models_dir: "models"
  raw_dataset: "data/synthetic_silo_dataset.csv"
  processed_dataset: "data/processed_dataset.parquet"
  feature_dataset: "data/feature_dataset.parquet"

# --------------------------------------------------------
# Generación de datos sintéticos
# --------------------------------------------------------
synthetic:
  n_silos: 50
  days: 120
  readings_per_day: 12          # cada 2 horas
  start_date: "2025-10-01T00:00:00-03:00"
  label_distribution:
    bien: 0.70
    tolerable: 0.15
    problema: 0.10
    critico: 0.05
  missing_rate: 0.03            # 3% valores faltantes aleatorios
  noise_std: 0.5

# --------------------------------------------------------
# Rangos físicos válidos
# --------------------------------------------------------
physical_ranges:
  temperature_c:
    min: -40.0
    max: 80.0
  humidity_pct:
    min: 0.0
    max: 100.0
  co2_ppm:
    min: 0.0
    max: 50000.0
  nh3_ppm:
    min: 0.0
    max: 500.0
  battery_pct:
    min: 0.0
    max: 100.0

# --------------------------------------------------------
# Preprocesamiento — Imputación
# --------------------------------------------------------
preprocessing:
  imputation:
    linear_interpolation_max_gap_hours: 6
    ffill_bfill_max_gap_hours: 48
  insufficient_data_threshold: 0.30   # >30% missing en 7d
  timestamp_timezone: "UTC"

# --------------------------------------------------------
# Feature Engineering — Ventanas
# --------------------------------------------------------
features:
  windows_hours: [6, 24, 72, 168]   # 6h, 24h, 72h, 7d
  primary_variables:
    - temperature_c
    - humidity_pct
    - co2_ppm
    - nh3_ppm
    - battery_pct
  aggregations:
    - mean
    - median
    - min
    - max
    - std
    - skew
  humidity_thresholds_pct: [16, 18, 20]
  co2_baseline_window_days: 30
  co2_spike_sigma: 3.0
  slope_thresholds:
    temperature_c: 0.5            # °C/h
    humidity_pct: 0.3             # pp/h

# --------------------------------------------------------
# Labeling — Umbrales heurísticos
# --------------------------------------------------------
labeling:
  critico:
    humidity_min: 25.0
    co2_min: 2000.0
    humidity_delta_24h_min: 3.0
    temperature_max_alt: 45.0
    co2_elevated_alt: 1500.0
  problema:
    humidity_range: [18.0, 25.0]
    co2_range: [1200.0, 2000.0]
    co2_sustained_hours: 48
  tolerable:
    spike_max_duration_hours: 48
  bien:
    stable_window_days: 7

# --------------------------------------------------------
# Modelo XGBoost (Fase A)
# --------------------------------------------------------
xgboost:
  objective: "multi:softprob"
  num_class: 4
  max_depth: 6
  n_estimators: 1000
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 50
  n_cv_folds: 5
  n_bootstrap_models: 5          # para incertidumbre
  class_names: ["bien", "tolerable", "problema", "critico"]

# --------------------------------------------------------
# Modelo LSTM (Fase B)
# --------------------------------------------------------
lstm:
  hidden_units: [128, 64]
  dropout: 0.2
  bidirectional: true
  batch_size: 64
  epochs: 50
  early_stopping_patience: 10
  sequence_length_hours: 720     # 30 días × 24h
  prediction_horizons_days: [1, 3, 7]
  mc_dropout_samples: 20

# --------------------------------------------------------
# Anomaly Detection (Fase C)
# --------------------------------------------------------
anomaly:
  model: "isolation_forest"
  contamination: 0.05
  n_estimators: 200
  threshold: 0.5

# --------------------------------------------------------
# Calibración e Incertidumbre
# --------------------------------------------------------
calibration:
  method: "isotonic"             # "platt" o "isotonic"

drift:
  psi_alert_threshold: 0.25
  check_interval_days: 30

# --------------------------------------------------------
# API
# --------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  api_key: "smisia-dev-key-2026"
  cors_origins: ["*"]
  max_batch_size: 100

# --------------------------------------------------------
# Redis / Cache
# --------------------------------------------------------
redis:
  host: "redis"
  port: 6379
  ttl_seconds: 3600

# --------------------------------------------------------
# Base de datos (PostgreSQL)
# --------------------------------------------------------
database:
  host: "postgres"
  port: 5432
  name: "smisia"
  user: "smisia"
  password: "smisia_pass"
