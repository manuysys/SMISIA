# ========================================================
# SMISIA — Docker Compose
# ========================================================
version: "3.8"

services:
  # API principal
  api:
    build: .
    container_name: smisia-api
    ports:
      - "8000:8000"
    environment:
      - SMISIA_CONFIG=/app/config.yml
      - SMISIA_API_KEY=smisia-dev-key-2026
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - smisia-net

  # Redis para cache
  redis:
    image: redis:7-alpine
    container_name: smisia-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - smisia-net

  # PostgreSQL para metadata (opcional)
  postgres:
    image: postgres:15-alpine
    container_name: smisia-postgres
    environment:
      POSTGRES_DB: smisia
      POSTGRES_USER: smisia
      POSTGRES_PASSWORD: smisia_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - smisia-net

volumes:
  pgdata:

networks:
  smisia-net:
    driver: bridge
